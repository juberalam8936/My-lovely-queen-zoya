<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queen Zoya 👑</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(135deg,#000,#1a001a,#ff4da6);
 color:white;
 text-align:center;
 overflow:hidden;
}

.screen{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
}

.hide{display:none}

/* button */
button{
 padding:15px 30px;
 font-size:18px;
 border:none;
 border-radius:30px;
 background:linear-gradient(45deg,gold,pink);
 animation:pulse 2s infinite;
}
@keyframes pulse{
 50%{transform:scale(1.1)}
}

/* card */
.card{
 background:rgba(255,255,255,0.1);
 padding:20px;
 border-radius:20px;
 backdrop-filter:blur(10px);
}

/* image */
.img-box{
 position:relative;
 margin-top:20px;
}
.img-box img{
 width:250px;
 border-radius:20px;
}
.crown{
 position:absolute;
 top:-30px;
 left:50%;
 transform:translateX(-50%);
 width:90px;
}

/* typing */
#typing{
 font-size:26px;
 color:gold;
}

/* hearts */
.heart{
 position:absolute;
 color:pink;
 animation:rise 6s linear infinite;
}
@keyframes rise{
 from{transform:translateY(0)}
 to{transform:translateY(-900px)}
}

/* flash */
.flash{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:white;
 opacity:0;
}
.flash.active{
 animation:flash 0.5s;
}
@keyframes flash{
 from{opacity:1}
 to{opacity:0}
}

/* confetti */
canvas{
 position:fixed;
 top:0;
 left:0;
 pointer-events:none;
}

/* SCRATCH FIX */
#c{
 touch-action:none;
 border-radius:20px;
}
</style>
</head>

<body>

<div id="flash" class="flash"></div>

<!-- START -->
<div id="start" class="screen">
<div class="card">
<h1>👑 Special Surprise</h1>
<button onclick="start()">Open Gift 💖</button>
</div>
</div>

<!-- SCRATCH -->
<div id="scratch" class="screen hide">
<div class="card">
<h2>Scratch to Reveal 🎁</h2>
<canvas id="c" width="300" height="200"></canvas>
</div>
</div>

<!-- FINAL -->
<div id="final" class="screen hide">

<div class="card">

<h1 id="typing"></h1>

<div class="img-box">
<img src="https://drive.google.com/uc?export=view&id=1CRBj9pGyTHbM6qS8yTtqE1epwo5nuxzg">
<img class="crown" src="https://cdn-icons-png.flaticon.com/512/616/616554.png">
</div>

<h2>🎉 10K Royal Family 🎉</h2>

<p id="shayri"></p>

<img src="https://drive.google.com/uc?export=view&id=16hjQL9bmrnR1aMceOA7zcU_Jdg4PdR-Z" width="120">
<img src="https://drive.google.com/uc?export=view&id=1nHJPZvEyX8hMShFG_d6kQJBFC-LC-GPx" width="120">

<h3>💝 By Juber 💝</h3>

</div>
</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<canvas id="confetti"></canvas>

<script>

/* START */
function start(){
 document.getElementById("start").classList.add("hide");
 document.getElementById("scratch").classList.remove("hide");
 initScratch();
}

/* SCRATCH (FIXED) */
function initScratch(){
 let canvas=document.getElementById("c");
 let ctx=canvas.getContext("2d");

 ctx.fillStyle="#999";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 let drawing=false;

 function getXY(e){
  let rect=canvas.getBoundingClientRect();
  if(e.touches){
    return {
      x:e.touches[0].clientX-rect.left,
      y:e.touches[0].clientY-rect.top
    }
  }else{
    return {x:e.offsetX,y:e.offsetY}
  }
 }

 function draw(e){
  if(!drawing)return;

  let pos=getXY(e);

  ctx.globalCompositeOperation="destination-out";
  ctx.beginPath();
  ctx.arc(pos.x,pos.y,30,0,Math.PI*2);
  ctx.fill();

  check();
 }

 canvas.addEventListener("mousedown",()=>drawing=true);
 canvas.addEventListener("mouseup",()=>drawing=false);
 canvas.addEventListener("mousemove",draw);

 canvas.addEventListener("touchstart",(e)=>{
  drawing=true;
  e.preventDefault();
 });

 canvas.addEventListener("touchend",(e)=>{
  drawing=false;
  e.preventDefault();
 });

 canvas.addEventListener("touchmove",(e)=>{
  draw(e);
  e.preventDefault();
 });

 function check(){
  let pixels=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  let count=0;
  for(let i=0;i<pixels.length;i+=4){
   if(pixels[i+3]==0)count++;
  }
  if(count>pixels.length/5){
   showFinal();
  }
 }
}

/* FINAL */
function showFinal(){
 document.getElementById("scratch").classList.add("hide");
 document.getElementById("final").classList.remove("hide");

 document.getElementById("music").play();

 flash();
 hearts();
 confetti();
 typeText();
 shayri();
}

/* FLASH */
function flash(){
 let f=document.getElementById("flash");
 f.classList.add("active");
}

/* TYPING */
let text="👑 Congratulations Miss Zoya 👑";
let i=0;
function typeText(){
 if(i<text.length){
  document.getElementById("typing").innerHTML+=text.charAt(i);
  i++;
  setTimeout(typeText,60);
 }
}

/* SHAYRI */
function shayri(){
 let arr=[
 "Teri muskaan meri duniya hai 💖",
 "10K nahi tera jaadu hai 👑",
 "Main sirf tera hoon ❤️"
 ];
 let i=0;
 setInterval(()=>{
  document.getElementById("shayri").innerHTML=arr[i];
  i=(i+1)%arr.length;
 },2000);
}

/* HEARTS */
function hearts(){
 for(let i=0;i<35;i++){
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
 }
}

/* CONFETTI */
function confetti(){
 let c=document.getElementById("confetti");
 let ctx=c.getContext("2d");
 c.width=window.innerWidth;
 c.height=window.innerHeight;
 for(let i=0;i<180;i++){
  ctx.fillRect(Math.random()*c.width,Math.random()*c.height,5,5);
 }
}

</script>

</body>
</html>
