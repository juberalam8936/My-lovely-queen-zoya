<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Congratulations Miss Zoya 10K!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');
        
        body {
            margin: 0; padding: 0; background: radial-gradient(circle, #fff0f5, #ffd1dc);
            font-family: 'Poppins', sans-serif; text-align: center; overflow-x: hidden;
        }

        /* Crown Animation */
        .crown { font-size: 60px; margin-top: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .header { color: #ff1493; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .id-tag { background: #ff4d94; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        /* Scratch Card Area */
        #scratch-container {
            position: relative; width: 320px; height: 400px; margin: 20px auto;
            border: 8px solid #ffd700; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden; touch-action: none; background: white;
        }
        #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: crosshair; }
        .hidden-photo { width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* Glow Button */
        .glow-btn {
            background: #ff1493; border: none; padding: 15px 40px; color: white;
            font-size: 20px; border-radius: 50px; cursor: pointer; margin: 20px 0;
            box-shadow: 0 0 15px #ff1493; transition: 0.3s; font-weight: bold;
        }
        .glow-btn:active { transform: scale(0.9); box-shadow: 0 0 30px #ff1493; }

        /* Flash BOOM Effect */
        #boom-box {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-weight: 900; color: #ff0; z-index: 999;
            text-shadow: 0 0 20px #f00, 0 0 40px #f00; animation: flash 0.5s ease-out;
        }
        @keyframes flash { 0% { scale: 0.5; opacity: 1; } 100% { scale: 3; opacity: 0; } }

        /* Shayri Box with Typing */
        #shayri-container {
            min-height: 80px; padding: 20px; font-family: 'Dancing Script', cursive;
            font-size: 24px; color: #444; margin: 10px;
        }

        .footer { padding: 20px; background: rgba(255,255,255,0.5); font-weight: bold; border-top: 2px solid #ffb6c1; }
        .hearts { color: red; animation: beat 0.5s infinite alternate; display: inline-block; }
        @keyframes beat { to { transform: scale(1.2); } }
    </style>
</head>
<body>

    <div id="boom-box">💥 FLASH BOOM!</div>

    <div class="crown">👑</div>
    <h1 class="header">Congratulations Miss Zoya!</h1>
    <span class="id-tag">@miss_zoya_ky</span>
    <h2 style="color: #333;">🎉 10,000 FOLLOWERS 🎉</h2>

    <div id="scratch-container">
        <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9" class="hidden-photo" id="mainPhoto">
        <canvas id="scratch-canvas" width="320" height="400"></canvas>
    </div>
    <p style="font-size: 14px; color: #888;">✋ Use your finger to scratch the photo! (iPhone Working)</p>

    <button class="glow-btn" onclick="startCelebration()">💖 Celebrate Now! 💖</button>

    <div id="shayri-container">
        <span id="typing-text">Click the button for a surprise...</span>
    </div>

    <div class="footer">
        Created with <span class="hearts">❤️</span> by <b>JUBER</b>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

<script>
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');
    const shayris = [
        "Teri kamyabi pe mera dil jhoom utha hai...",
        "10K toh sirf shuruat hai, abhi poora aasmaan baaki hai!",
        "Zoya, tum jaise chamakti raho hamesha!",
        "Duniya ki har khushi mile tumhe, Congratulations!"
    ];
    let shayriIndex = 0;

    // Canvas setup (Silver Layer)
    function initCanvas() {
        ctx.fillStyle = '#C0C0C0'; // Silver color
        ctx.fillRect(0, 0, 320, 400);
        ctx.fillStyle = '#ff1493';
        ctx.font = "bold 24px Arial";
        ctx.textAlign = "center";
        ctx.fillText("SCRATCH ME ✋", 160, 200);
    }
    initCanvas();

    // Scratch logic
    let isDrawing = false;
    function scratch(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 30, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousedown', () => isDrawing = true);
    canvas.addEventListener('touchstart', () => isDrawing = true);
    window.addEventListener('mouseup', () => isDrawing = false);
    window.addEventListener('touchend', () => isDrawing = false);
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});

    // Celebration sequence
    function startCelebration() {
        // Music play
        document.getElementById('bgMusic').play();

        // Flash Boom
        const boom = document.getElementById('boom-box');
        boom.style.display = 'block';
        setTimeout(() => { boom.style.display = 'none'; }, 800);

        // Confetti
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#ff1493', '#ffd700', '#ffffff']
        });

        // Typing Shayri
        typeWriter();
    }

    function typeWriter() {
        let i = 0;
        let text = shayris[shayriIndex];
        document.getElementById("typing-text").innerHTML = "";
        function type() {
            if (i < text.length) {
                document.getElementById("typing-text").innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 100);
            }
        }
        type();
        shayriIndex = (shayriIndex + 1) % shayris.length;
    }
</script>
</body>
</html>
